name: overlay-image
# Build the self-hosted Dograh engine image and push to GHCR under our fork's
# namespace (the upstream docker-image workflow needs DockerHub + GHCR secrets
# we don't have). The image is the upstream api/Dockerfile as-is — overlay/
# code is shipped alongside but not yet in the runtime path.
#
# Tags pushed:
#   - ghcr.io/<owner>/voice-engine:<short-sha>     (always)
#   - ghcr.io/<owner>/voice-engine:main            (main only)
#   - ghcr.io/<owner>/voice-engine:latest          (main only)
#   - ghcr.io/<owner>/voice-engine:pr-<short-sha>  (phase-2/p2d-* branches)

on:
  push:
    branches:
      - main
      - "phase-2/p2d-*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          IMG="ghcr.io/${{ steps.owner.outputs.name }}/voice-engine"
          SHORT="${{ steps.sha.outputs.short }}"
          TAGS=("$IMG:$SHORT")
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            TAGS+=("$IMG:main" "$IMG:latest")
          else
            TAGS+=("$IMG:pr-$SHORT")
          fi
          # Join with commas for docker/build-push-action.
          ( IFS=,; echo "list=${TAGS[*]}" ) >> "$GITHUB_OUTPUT"
          echo "Tagging: ${TAGS[@]}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
