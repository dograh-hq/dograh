apiVersion: v2
name: dograh
description: |
  Dograh — open-source voice AI platform. Deploys the FastAPI backend
  (decomposed into web, ARQ worker, ARI manager singleton, and campaign
  orchestrator singleton), the Next.js UI, and coturn for WebRTC media
  relay. Optional bundled PostgreSQL, Redis, and MinIO via subcharts.
type: application

# version: chart version. Bump for any chart change.
# appVersion: Dograh application version. Tracks the image tag.
version: 0.1.0
appVersion: "0.1.0"

kubeVersion: ">=1.28.0-0"

keywords:
  - voice-ai
  - webrtc
  - telephony
  - fastapi

home: https://dograh.com
sources:
  - https://github.com/dograh-hq/dograh

maintainers:
  - name: Dograh

# Bundled stateful dependencies. Each is gated by its mode toggle in
# values.yaml so external-managed deployments do not pull these charts.
dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  # Aliased to redisInternal so the dograh-level `redis.mode` toggle does not
  # collide with the subchart's values namespace.
  - name: redis
    alias: redisInternal
    version: "20.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redisInternal.enabled
  - name: minio
    version: "16.x.x"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: minio.enabled
