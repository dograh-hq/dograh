services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: >
      --requirepass redissecret
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redissecret", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ────────────────────────────────────────────────────────────────
  # Local MPS Gateway — replaces Dograh cloud MPS for offline dev.
  # Start with: docker compose -f docker-compose-local.yaml --profile local-mps up -d local-mps
  # Then set in api/.env: MPS_API_URL=http://localhost:9000
  # ────────────────────────────────────────────────────────────────
  local-mps:
    build:
      context: ..
      dockerfile: api/Dockerfile.mps
    image: dograh-local-mps:latest
    profiles: ["local-mps"]
    container_name: dograh_local_mps
    restart: unless-stopped
    environment:
      LOCAL_MPS_PORT: "9000"
      LOCAL_MPS_DATA_DIR: "/data/docstore"
      LOCAL_MPS_EMBEDDING_PROVIDER: "openai"
      LOCAL_MPS_EMBEDDING_MODEL: "text-embedding-3-small"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "9000:9000"
    volumes:
      - mps-docstore:/data/docstore
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mps-docstore:
    driver: local

networks:
  app-network:
    driver: bridge
